spring.application.name=Cronoclase Grupo 5



spring.config.import=optional:file:.env[.properties]

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
# UI disponible en: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
# JSON de la colección en: http://localhost:8080/v3/api-docs
springdoc.api-docs.path=/v3/api-docs
# Ordenar endpoints por método HTTP
springdoc.swagger-ui.operations-sorter=method
# Expandir todos los endpoints al abrir Swagger
springdoc.swagger-ui.doc-expansion=list

